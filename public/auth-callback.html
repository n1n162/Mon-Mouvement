<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion en cours…</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; color: #666; }
  </style>
</head>
<body>
  <p>⏳ Vérification de votre accès…</p>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_dW5pZmllZC1oYXJlLTkyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script>
    window.addEventListener("load", async () => {
      await window.Clerk.load();

      if (!window.Clerk.user) {
        window.location.href = "/login.html";
        return;
      }

      const token = await window.Clerk.session.getToken();
      const res = await fetch("/api/check-access", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      window.location.href = data.hasAccess ? "/" : "/pricing.html";
    });
  </script>
</body>
</html>
