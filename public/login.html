<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Mon Mouvement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { background: white; border-radius: 16px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 1.6rem; color: #1a1a1a; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 1rem; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 0.8rem; transition: background 0.2s; }
    .btn:hover { background: #333; }
    .loading { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏫 Mon Mouvement</h1>
    <p>Connectez-vous pour accéder à l'application</p>
    <button class="btn" onclick="loginWithGoogle()">Continuer avec Google</button>
    <button class="btn" onclick="loginWithApple()" style="background:#555;">Continuer avec Apple</button>
    <button class="btn" onclick="loginWithEmail()" style="background:#fff; color:#1a1a1a; border:1px solid #ddd;">Continuer avec Email</button>
    <p class="loading" id="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/auth0-js@9.23.0/build/auth0.min.js"></script>
  <script>
    const auth0 = new auth0.WebAuth({
      domain: 'dev-if8zn02ahslylqpv.us.auth0.com',
      clientID: 'bDmc7J7wbBiey5TgVNSOOmTI2m3CGyiU',
      redirectUri: window.location.origin + '/auth-callback.html',
      responseType: 'token id_token',
      scope: 'openid profile email'
    });

    // Si déjà un token valide, rediriger
    const token = localStorage.getItem('auth0_token');
    const expiry = localStorage.getItem('auth0_expiry');
    if (token && expiry && Date.now() < parseInt(expiry)) {
      window.location.href = '/auth-callback.html';
    }

    function loginWithGoogle() {
      auth0.authorize({ connection: 'google-oauth2' });
    }

    function loginWithApple() {
      auth0.authorize({ connection: 'apple' });
    }

    function loginWithEmail() {
      auth0.authorize();
    }
  </script>
</body>
</html>
